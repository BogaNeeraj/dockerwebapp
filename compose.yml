version: "3.9"

services:
  devopsdb:
    image: chintu98/automation:db
    ports:
      - "3306:3306"
    deploy:
      replicas: 1
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - mynetwork

  application:
    image: chintu98/automation:app
    ports:
      - "1111:8080"
    deploy:
      replicas: 1
    depends_on:
      - devopsdb
    networks:
      - mynetwork

networks:
  mynetwork:
    driver: overlay

volumes:
  dbdata:
